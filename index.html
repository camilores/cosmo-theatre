<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cosmo — Theatre</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; }
    #btn-vr {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      padding: 12px 32px; border: 1px solid rgba(255,255,255,0.3);
      border-radius: 999px; background: rgba(255,255,255,0.12);
      color: #fff; font-size: 15px; font-weight: 600;
      cursor: pointer; backdrop-filter: blur(12px);
    }
    #btn-vr:disabled { opacity: 0.35; cursor: default; }
    #status {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.55); font-size: 13px;
      background: rgba(0,0,0,0.5); padding: 6px 18px;
      border-radius: 999px; transition: opacity 1.5s;
      font-family: sans-serif;
    }
  </style>
</head>
<body>

<canvas id="c"></canvas>
<div id="status">Cargando teatro...</div>
<button id="btn-vr" disabled>Entrar en VR</button>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.157.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.157.0/examples/jsm/",
    "@lumaai/luma-web": "https://unpkg.com/@lumaai/luma-web@0.2.0/dist/library/luma-web.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { LumaSplatsThree } from '@lumaai/luma-web';

const canvas = document.getElementById('c');
const status = document.getElementById('status');
const vrBtn  = document.getElementById('btn-vr');

// Renderer
const renderer = new THREE.WebGLRenderer({ canvas, antialias: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.xr.enabled = true;

// Boton VR
if (navigator.xr) {
  navigator.xr.isSessionSupported('immersive-vr').then(ok => {
    if (ok) {
      vrBtn.disabled = false;
      vrBtn.addEventListener('click', () => {
        navigator.xr.requestSession('immersive-vr', {
          optionalFeatures: ['local-floor', 'bounded-floor']
        }).then(s => renderer.xr.setSession(s));
      });
    } else {
      vrBtn.textContent = 'VR no disponible';
    }
  });
}

// Escena y camara
const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 1.6, 3);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.target.set(0, 1.6, 0);

// Gaussian Splat — Théâtre du Jeu de Paume, Aix en Provence
const splat = new LumaSplatsThree({
  source: 'https://lumalabs.ai/capture/f274b732',
});
scene.add(splat);

splat.onLoad = () => {
  status.textContent = '🎭 Théâtre du Jeu de Paume — Aix en Provence';
  setTimeout(() => status.style.opacity = '0', 3000);
};

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Loop
renderer.setAnimationLoop(() => {
  controls.update();
  renderer.render(scene, camera);
});
</script>

</body>
</html>
